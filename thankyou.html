<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
      color: #333;
      padding: 50px;
    }
    .card {
      background: white;
      border: 3px solid gold;
      border-radius: 12px;
      padding: 40px;
      display: inline-block;
      max-width: 600px;
    }
    h1 {
      color: #b8860b;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
    }
    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background-color: #b8860b;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .button:hover {
      background-color: #daa520;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You for Your Generous Gift!</h1>
    <p>Your support strengthens <strong>Time of Life Centre Ministries</strong> 
       and helps us continue building, serving, and reaching our community.</p>
    <p>We are deeply grateful for your partnership.</p>
    <a href="https://timeoflifecentreministries.github.io/timeoflifecentreministries/" class="button">
      Back to Home
    </a>
  </div>
</body>
</html>
